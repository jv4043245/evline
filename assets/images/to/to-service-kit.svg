<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Комплект ТО EVLine з картою робіт</title>
  <desc id="desc">Коробка EVLine з оригінальними розхідниками та планшетом з технологічною картою робіт.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbf7"/>
      <stop offset="1" stop-color="#d9f3e5"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c28f"/>
      <stop offset="1" stop-color="#c79b62"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#65c47d"/>
      <stop offset="1" stop-color="#0f6f48"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="720" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="632" cy="78" r="98" fill="#fff" opacity=".32"/>
  <circle cx="93" cy="438" r="110" fill="#00b472" opacity=".07"/>

  <g filter="url(#shadow)">
    <rect x="62" y="290" width="338" height="142" rx="20" fill="url(#box)"/>
    <path d="M82 288h294l-52-70H130z" fill="#d5a970"/>
    <path d="M62 291l-36-62 92-16 12 75z" fill="#c7965d"/>
    <path d="M399 291l52-64-98-18-28 79z" fill="#c7965d"/>
    <rect x="62" y="342" width="338" height="42" fill="#146c45"/>
    <circle cx="118" cy="363" r="18" fill="#72bd45"/>
    <text x="118" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0c1712">EV</text>
    <text x="145" y="370" font-family="Arial, sans-serif" font-size="23" font-style="italic" font-weight="700" fill="#fff">Line</text>
    <text x="378" y="370" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#d8f5e4">original service kit</text>
    <rect x="90" y="398" width="126" height="22" rx="11" fill="#fff" opacity=".92"/>
    <text x="153" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#146c45">VIN CHECKED</text>
  </g>

  <g transform="translate(114 124)" filter="url(#shadow)">
    <rect x="0" y="36" width="60" height="116" rx="12" fill="url(#green)"/>
    <rect x="8" y="54" width="44" height="46" rx="7" fill="#fff" opacity=".94"/>
    <text x="30" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111816">OIL</text>
    <rect x="10" y="16" width="24" height="22" rx="5" fill="#0d5c3d"/>
    <rect x="36" y="24" width="28" height="14" rx="7" fill="#0d5c3d"/>
    <text x="30" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#294b3c">олива</text>
  </g>

  <g transform="translate(205 132)" filter="url(#shadow)">
    <rect x="0" y="34" width="64" height="86" rx="32" fill="#fff" stroke="#d4e6dc" stroke-width="4"/>
    <rect x="12" y="12" width="40" height="24" rx="12" fill="#146c45"/>
    <g stroke="#48b876" stroke-width="4">
      <line x1="14" y1="52" x2="14" y2="104"/>
      <line x1="24" y1="52" x2="24" y2="104"/>
      <line x1="34" y1="52" x2="34" y2="104"/>
      <line x1="44" y1="52" x2="44" y2="104"/>
      <line x1="54" y1="52" x2="54" y2="104"/>
    </g>
    <text x="32" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#294b3c">фільтр</text>
  </g>

  <g transform="translate(296 133)" filter="url(#shadow)">
    <rect x="0" y="31" width="54" height="98" rx="12" fill="#fff" stroke="#d4e6dc" stroke-width="4"/>
    <rect x="0" y="70" width="54" height="59" rx="12" fill="#42ad6f"/>
    <rect x="13" y="12" width="28" height="20" rx="6" fill="#0d5c3d"/>
    <text x="27" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">COOL</text>
    <text x="27" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#294b3c">рідина</text>
  </g>

  <g transform="translate(442 105)" filter="url(#shadow)">
    <rect x="0" y="0" width="214" height="304" rx="28" fill="#111816"/>
    <rect x="14" y="18" width="186" height="268" rx="18" fill="#fff"/>
    <rect x="14" y="18" width="186" height="58" rx="18" fill="#163d2b"/>
    <text x="32" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">Карта робіт</text>
    <text x="32" y="65" font-family="Arial, sans-serif" font-size="11" fill="#9de5bd">під вашу модель</text>
    <g font-family="Arial, sans-serif" font-size="12" fill="#294b3c">
      <rect x="32" y="100" width="150" height="24" rx="12" fill="#eff8f2"/>
      <text x="46" y="117">1. партномери по VIN</text>
      <rect x="32" y="136" width="150" height="24" rx="12" fill="#eff8f2"/>
      <text x="46" y="153">2. точки доступу</text>
      <rect x="32" y="172" width="150" height="24" rx="12" fill="#eff8f2"/>
      <text x="46" y="189">3. моменти затяжки</text>
      <rect x="32" y="208" width="150" height="24" rx="12" fill="#eff8f2"/>
      <text x="46" y="225">4. що не змішувати</text>
    </g>
    <circle cx="106" cy="260" r="12" fill="#00b472"/>
  </g>

  <path d="M408 212c34 5 55 20 68 47" fill="none" stroke="#00b472" stroke-width="5" stroke-linecap="round" opacity=".55"/>
  <path d="M475 259l-20-4 12-16" fill="none" stroke="#00b472" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
</svg>
